<!DOCTYPE html>
<html>
<head>
    <title>The Twilight Sepulcher</title>
    <style>
        body { background: #050505; color: #b0a4c8; font-family: 'Palatino Linotype', serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at center, #15002b 0%, #050505 100%); }
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 4px; max-width: 80%; line-height: 1.6; }
        .user { background: rgba(255,255,255,0.05); align-self: flex-end; margin-left: auto; border: 1px solid #333; color: white; }
        .nocturnal { background: rgba(75, 0, 130, 0.2); border-left: 3px solid #4b0082; color: #e0e0e0; font-style: italic; }
        #input-bar { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #2a0052; }
        input { flex: 1; padding: 12px; border: 1px solid #4b0082; background: #111; color: white; border-radius: 4px; outline: none; }
        button { padding: 10px 25px; background: #4b0082; color: white; border: none; cursor: pointer; font-variant: small-caps; }
    </style>
</head>
<body>

<div style="text-align:center; padding: 10px; background: #000;">
    <input type="password" id="api-key" placeholder="Paste your Groq Key here..." style="width: 300px;">
</div>

<div id="chat">
    <div class="msg nocturnal">The Ebonmere stirs... Speak, mortal.</div>
</div>

<div id="input-bar">
    <input type="text" id="user-input" placeholder="Offer your words..." onkeypress="if(event.key === 'Enter') speak()">
    <button onclick="speak()">Speak</button>
</div>

<script>
    async function speak() {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const text = input.value.trim();

        if (!text || !key) return;
        append('user', text);
        input.value = '';

        // We use a CORS Proxy to trick the browser into allowing the request from a local file
        const proxy = "https://corsproxy.io/?"; 
        const url = "https://api.groq.com/openai/v1/chat/completions";

        try {
            const response = await fetch(proxy + encodeURIComponent(url), {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${key}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are Nocturnal from Skyrim. Be cold, mysterious, and transactional. You are a Daedric Prince. Call the user mortal." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            append('nocturnal', data.choices[0].message.content);
        } catch (err) {
            append('nocturnal', "The shadows are silent. Try using a 'Private/Incognito' window or check your key.");
        }
    }

    function append(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
