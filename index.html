<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Twilight Sepulcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #050505; 
            color: #b0a4c8; 
            font-family: 'Lora', serif; /* Main high-readability font */
            font-size: 18px; /* Larger base text */
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        h1 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: #4b0082;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(75, 0, 130, 0.5);
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            background: radial-gradient(circle at center, #15002b 0%, #050505 100%); 
        }

        .msg { 
            margin-bottom: 25px; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 80%; 
            line-height: 1.6; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .user { 
            background: rgba(255,255,255,0.08); 
            align-self: flex-end; 
            margin-left: auto; 
            border: 1px solid #444; 
            color: white; 
        }

        .nocturnal { 
            background: rgba(75, 0, 130, 0.25); 
            border-left: 6px solid #4b0082; 
            color: #f0f0f0; 
            font-style: italic; 
            font-weight: 500;
        }

        #input-bar { 
            padding: 25px; 
            background: #0a0a0a; 
            display: flex; 
            gap: 15px; 
            border-top: 2px solid #2a0052; 
        }

        input { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #4b0082; 
            background: #111; 
            color: white; 
            border-radius: 5px; 
            outline: none; 
            font-size: 18px;
            font-family: 'Lora', serif;
        }

        button { 
            padding: 10px 30px; 
            background: #4b0082; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-family: 'Cinzel', serif;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover { background: #6a0dad; box-shadow: 0 0 15px #4b0082; }

        #debug { font-size: 12px; color: #ff4444; background: #000; padding: 5px; display: none; text-align: center; }
    </style>
</head>
<body>

<h1>The Twilight Sepulcher</h1>

<div style="text-align:center; padding: 10px; background: #000;">
    <input type="password" id="api-key" placeholder="Paste Groq API Key here..." style="width: 350px; font-size: 14px;">
</div>
<div id="debug"></div>

<div id="chat">
    <div class="msg nocturnal">The Ebonmere stirs... I am Nocturnal. You stand within the shadows of my influence, mortal. Speak clearly, or remain in the dark.</div>
</div>

<div id="input-bar">
    <input type="text" id="user-input" placeholder="Offer a thought..." onkeypress="if(event.key === 'Enter') speak()">
    <button id="send-btn" onclick="speak()">Speak</button>
</div>

<script>
    async function speak() {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('send-btn');
        const text = input.value.trim();

        if (!text || !key) return;
        
        append('user', text);
        input.value = '';
        debug.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${key}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are Nocturnal from Skyrim. Be cold, mysterious, superior, and transactional. Use lore-accurate terms like 'Ebonmere', 'Nightingale', 'luck', and 'shadows'. Never break character." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            append('nocturnal', data.choices[0].message.content);
        } catch (err) {
            debug.innerText = "Error: " + err.message;
            debug.style.display = 'block';
            append('nocturnal', "The shadows are silent. Verify your key.");
        } finally {
            btn.disabled = false;
        }
    }

    function append(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
