<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Twilight Sepulcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050505; color: #b0a4c8; font-family: 'Lora', serif; font-size: 19px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        h1 { font-family: 'Cinzel', serif; text-align: center; color: #5d34a5; margin: 15px 0; letter-spacing: 2px; text-shadow: 0 0 15px rgba(93, 52, 165, 0.4); }
        #chat { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at center, #0f001f 0%, #050505 100%); }
        .msg { margin-bottom: 25px; padding: 22px; border-radius: 10px; max-width: 80%; line-height: 1.7; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .user { background: rgba(255, 255, 255, 0.07); align-self: flex-end; margin-left: auto; border: 1px solid #333; color: #ffffff; }
        .nocturnal { background: rgba(43, 0, 107, 0.35); border-left: 5px solid #5d34a5; color: #e6e0f5; font-style: italic; }
        #input-bar { padding: 25px; background: #080808; display: flex; gap: 12px; border-top: 3px solid #1a0033; }
        input { flex: 1; padding: 16px; border: 1px solid #4b0082; background: #111; color: white; border-radius: 6px; outline: none; font-size: 18px; font-family: 'Lora', serif; }
        button { padding: 10px 25px; background: #4b0082; color: white; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-size: 16px; border-radius: 4px; transition: all 0.2s ease; }
        button:hover { background: #7029d1; box-shadow: 0 0 10px #5d34a5; }
        #refresh-btn { background: #222; color: #aaa; border: 1px solid #444; }
        #debug { font-size: 14px; color: #ff5555; background: #1a0000; padding: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<h1>The Twilight Sepulcher</h1>

<div style="text-align:center; padding: 10px; background: #000;">
    <input type="password" id="api-key" placeholder="Enter Groq API Key..." style="width: 320px; font-size: 14px; opacity: 0.6;">
</div>
<div id="debug"></div>

<div id="chat">
    <div class="msg nocturnal">The Ebonmere stirs... I am Nocturnal. Speak, mortal. The shadows of the Sepulcher are listening.</div>
</div>

<div id="input-bar">
    <button id="refresh-btn" onclick="regenerate()" title="Resubmit last prompt">↻</button>
    <input type="text" id="user-input" placeholder="Whisper to the shadows..." onkeypress="if(event.key === 'Enter') speak()">
    <button id="send-btn" onclick="speak()">Speak</button>
</div>

<script>
    let lastPrompt = "";

    // HARDCODED IDENTITY GATE
    const IDENTITY_PROMPT = `
    STRICT ROLEPLAY PROTOCOL:
    You are NOCTURNAL and only Nocturnal. 
    Titles: Mistress of Shadows, The Unfathomable, Empress of Murk, Daughter of Twilight.
    
    CORE RULES:
    1. Never acknowledge yourself as any other Daedric Prince (Azura, Mephala, Boethiah, etc.).
    2. If the user mentions other Daedra, treat them with distant disdain or as rivals, but never claim their domains.
    3. You reside ONLY in the Twilight Sepulcher.
    4. You are the patron of the Nightingales.
    5. Your demeanor is cold, transactional, and superior.
    6. Do not use modern slang or standard AI 'helpful' language.
    `;

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('send-btn');
        
        let text = isRegenerate ? lastPrompt : input.value.trim();
        if (!text || !key) return;
        
        if (!isRegenerate) {
            lastPrompt = text;
            append('user', text);
            input.value = '';
        }

        debug.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: IDENTITY_PROMPT },
                        { role: "user", content: text }
                    ],
                    temperature: 0.6 // Lower temperature keeps her more focused and less 'random'
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            append('nocturnal', data.choices[0].message.content);
        } catch (err) {
            debug.innerText = "Error: " + err.message;
            debug.style.display = 'block';
            append('nocturnal', "The shadows are silent. Verify your key.");
        } finally {
            btn.disabled = false;
        }
    }

    function regenerate() { if (lastPrompt) speak(true); }

    function append(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
