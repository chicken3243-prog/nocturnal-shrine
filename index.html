<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Twilight Sepulcher</title>
    <style>
        body { background: #050505; color: #b0a4c8; font-family: 'Palatino Linotype', serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at center, #15002b 0%, #050505 100%); scroll-behavior: smooth; }
        .msg { margin-bottom: 25px; padding: 18px; border-radius: 4px; max-width: 75%; line-height: 1.7; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .user { background: rgba(255,255,255,0.03); align-self: flex-end; margin-left: auto; border: 1px solid #333; color: #fff; }
        .nocturnal { background: rgba(75, 0, 130, 0.15); border-left: 4px solid #4b0082; color: #dcdcdc; font-style: italic; border-bottom: 1px solid rgba(75, 0, 130, 0.3); }
        #input-bar { padding: 25px; background: #080808; display: flex; gap: 15px; border-top: 1px solid #2a0052; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        input { flex: 1; padding: 15px; border: 1px solid #4b0082; background: #111; color: white; border-radius: 4px; outline: none; font-size: 1em; }
        button { padding: 10px 30px; background: #4b0082; color: white; border: none; cursor: pointer; font-variant: small-caps; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #6a0dad; box-shadow: 0 0 15px #4b0082; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
        .key-area { font-size: 11px; padding: 10px; text-align: center; background: #000; color: #444; border-bottom: 1px solid #111; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2a0052; border-radius: 10px; }
    </style>
</head>
<body>

<div class="key-area">
    <input type="password" id="api-key" placeholder="Enter Groq API Key..." style="width: 250px; height: 15px; font-size: 10px; padding: 5px;">
</div>

<div id="chat">
    <div class="msg nocturnal">The Ebonmere stirs... I am Nocturnal. Speak, mortal, but know that every word has a price in the shadows.</div>
</div>

<div id="input-bar">
    <input type="text" id="user-input" placeholder="Offer your words to the void..." autocomplete="off">
    <button id="send-btn">Speak</button>
</div>

<script>
    const btn = document.getElementById('send-btn');
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat');

    async function speak() {
        const key = document.getElementById('api-key').value.trim();
        const text = input.value.trim();

        if (!text || !key) {
            if (!key) alert("The Mistress requires a key (Groq API Key) to manifest.");
            return;
        }

        append('user', text);
        input.value = '';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are Nocturnal from Skyrim. You are the Daedric Prince of Night and Luck. You are cold, superior, and transactional. You call the user 'mortal', 'thief', or 'Nightingale'. Use Skyrim lore (Ebonmere, Skeleton Key, Twilight Sepulcher). Never break character." },
                        { role: "user", content: text }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            append('nocturnal', data.choices[0].message.content);
        } catch (err) {
            append('nocturnal', "The shadows are silent. Verify your key or your connection to the void.");
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    function append(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.addEventListener('click', speak);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') speak(); });
</script>
</body>
</html>
